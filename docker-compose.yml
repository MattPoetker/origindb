version: '3.8'

services:
  instantdb:
    image: instantdb/instantdb:latest
    container_name: instantdb-server
    ports:
      - "8080:8080"    # WebSocket port
      - "50051:50051"  # gRPC port
    volumes:
      - instantdb_data:/data
      - ./logs:/logs:rw
    environment:
      - INSTANTDB_LOG_LEVEL=info
      - INSTANTDB_WS_PORT=8080
      - INSTANTDB_GRPC_PORT=50051
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "instantdb_sql", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: instantdb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
    depends_on:
      - instantdb
    restart: unless-stopped
    profiles:
      - production

  # Optional: Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: instantdb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    profiles:
      - monitoring

  # Optional: Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: instantdb-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  instantdb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: instantdb-network