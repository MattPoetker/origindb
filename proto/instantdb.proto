syntax = "proto3";

package instantdb.grpc;

// SQL execution service
service SQLService {
  // Execute a SQL statement and return results
  rpc Execute(SQLRequest) returns (SQLResponse);

  // Execute multiple SQL statements in a transaction
  rpc ExecuteTransaction(SQLTransactionRequest) returns (SQLTransactionResponse);

  // Get server status and statistics
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}

// WASM module management service
service WasmService {
  // Deploy a new WASM module
  rpc DeployModule(DeployModuleRequest) returns (DeployModuleResponse);

  // Remove a WASM module
  rpc UndeployModule(UndeployModuleRequest) returns (UndeployModuleResponse);

  // List all deployed modules
  rpc ListModules(ListModulesRequest) returns (ListModulesResponse);

  // Get module information
  rpc GetModule(GetModuleRequest) returns (GetModuleResponse);

  // Execute a reducer function
  rpc ExecuteReducer(ExecuteReducerRequest) returns (ExecuteReducerResponse);
}

// SQL execution request
message SQLRequest {
  string sql = 1;
}

// SQL execution response
message SQLResponse {
  bool success = 1;
  string error = 2;
  repeated Row rows = 3;
  int32 rows_affected = 4;
  int64 execution_time_micros = 5;
}

// Transaction request with multiple SQL statements
message SQLTransactionRequest {
  repeated string sql_statements = 1;
}

// Transaction response
message SQLTransactionResponse {
  bool success = 1;
  string error = 2;
  repeated SQLResponse results = 3;
  int64 transaction_id = 4;
}

// Status request (empty for now)
message StatusRequest {
}

// Server status response
message StatusResponse {
  string version = 1;
  int64 uptime_seconds = 2;
  ServerStats stats = 3;
}

// Row data structure
message Row {
  string key = 1;
  map<string, ColumnValue> columns = 2;
}

// Column value with type information
message ColumnValue {
  oneof value {
    int64 int64_value = 1;
    string string_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    bytes bytes_value = 5;
  }
}

// Server statistics
message ServerStats {
  int64 total_tables = 1;
  int64 total_rows = 2;
  int64 storage_bytes = 3;
  int64 active_connections = 4;
  int64 active_subscriptions = 5;
  int64 events_published = 6;
  int64 total_queries = 7;
  int64 successful_queries = 8;
  int64 failed_queries = 9;
  int64 loaded_modules = 10;
}

// WASM module deployment request
message DeployModuleRequest {
  string name = 1;
  bytes bytecode = 2;
  string version = 3;
  repeated TableSchema tables = 4;
  repeated ReducerDefinition reducers = 5;
  ModuleCapabilities capabilities = 6;
}

// Sandbox restrictions for a deployed module. Unset/zero = engine defaults.
message ModuleCapabilities {
  repeated string allowed_tables = 1;  // empty = all tables
  bool read_only = 2;
  uint32 max_memory_mb = 3;
  uint32 timeout_ms = 4;
}

// Module deployment response
message DeployModuleResponse {
  bool success = 1;
  string error = 2;
  string module_id = 3;
}

// Module removal request
message UndeployModuleRequest {
  string name = 1;
}

// Module removal response
message UndeployModuleResponse {
  bool success = 1;
  string error = 2;
}

// List modules request
message ListModulesRequest {
}

// List modules response
message ListModulesResponse {
  repeated ModuleInfo modules = 1;
}

// Get module request
message GetModuleRequest {
  string name = 1;
}

// Get module response
message GetModuleResponse {
  bool success = 1;
  string error = 2;
  ModuleInfo module = 3;
}

// Execute reducer request
message ExecuteReducerRequest {
  string module_name = 1;
  string reducer_name = 2;
  string sender_identity = 3;
  string connection_id = 4;
  repeated WasmValue args = 5;
}

// Execute reducer response
message ExecuteReducerResponse {
  bool success = 1;
  string error = 2;
  repeated WasmValue results = 3;
  int64 execution_time_micros = 4;
}

// Module information
message ModuleInfo {
  string name = 1;
  string version = 2;
  repeated TableSchema tables = 3;
  repeated ReducerDefinition reducers = 4;
  bool loaded = 5;
  bool validated = 6;
  string sha256 = 7;
  uint64 deployed_at_ms = 8;
}

// Table schema definition
message TableSchema {
  string name = 1;
  repeated ColumnDefinition columns = 2;
  repeated string primary_key = 3;
  repeated string indices = 4;
}

// Column definition
message ColumnDefinition {
  string name = 1;
  ColumnType type = 2;
  bool nullable = 3;
  bool is_primary_key = 4;
}

// Column types
enum ColumnType {
  INT64 = 0;
  STRING = 1;
  DOUBLE = 2;
  BOOL = 3;
  BYTES = 4;
}

// Reducer definition
message ReducerDefinition {
  string name = 1;
  repeated string param_types = 2;
  string return_type = 3;
  bool is_init = 4;
  bool is_client_connected = 5;
  bool is_client_disconnected = 6;
}

// WASM value type for communication
message WasmValue {
  oneof value {
    int64 int64_value = 1;
    string string_value = 2;
    double double_value = 3;
    bool bool_value = 4;
    bytes bytes_value = 5;
  }
}