<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>cube.io — an OriginDB demo</title>
<style>
  :root {
    --bg: #070a12;
    --grid: #111a2e;
    --ink: #e8f0ff;
    --dim: #6b7a99;
    --accent: #38f5c8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--ink);
    font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, monospace; }
  #game { display: block; position: fixed; inset: 0; cursor: crosshair; }

  .hud { position: fixed; z-index: 5; pointer-events: none; text-shadow: 0 1px 3px #000a; }
  #score { top: 14px; left: 16px; font-size: 13px; letter-spacing: .04em; }
  #score b { color: var(--accent); font-size: 22px; }
  #board { top: 14px; right: 16px; text-align: right; font-size: 12px; line-height: 1.7; min-width: 150px; }
  #board .t { color: var(--dim); letter-spacing: .18em; font-size: 10px; margin-bottom: 3px; }
  #board .row { color: var(--ink); }
  #board .row .m { color: var(--accent); }
  #board .me { text-shadow: 0 0 8px var(--accent); }
  #hint { bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--dim);
    letter-spacing: .06em; }
  #hint kbd { color: var(--ink); background: #16203a; border: 1px solid #24314f; border-radius: 4px;
    padding: 1px 6px; }
  #conn { bottom: 12px; right: 16px; font-size: 10px; letter-spacing: .1em; color: var(--dim); }
  #conn.ok { color: var(--accent); }

  /* Overlays: join + death */
  .overlay { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center;
    background: radial-gradient(120% 90% at 50% 0%, #0c1navy 0%, #05070d 70%);
    background: radial-gradient(120% 90% at 50% 0%, rgba(20,30,60,.6), rgba(5,7,13,.94)); }
  .overlay.hidden { display: none; }
  .card { width: min(90vw, 420px); text-align: center; padding: 36px 30px;
    background: linear-gradient(180deg, #0d1424, #0a0f1c); border: 1px solid #1c2740;
    border-radius: 18px; box-shadow: 0 30px 80px -30px #000, inset 0 1px 0 #ffffff0d; }
  .logo { font-size: 40px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 4px; }
  .logo .io { color: var(--accent); }
  .tag { color: var(--dim); font-size: 12px; letter-spacing: .05em; margin-bottom: 26px; }
  .field { display: flex; gap: 10px; margin-bottom: 16px; }
  input[type=text] { flex: 1; background: #060a13; border: 1px solid #24314f; color: var(--ink);
    border-radius: 10px; padding: 12px 14px; font-family: inherit; font-size: 15px; outline: none; }
  input[type=text]:focus { border-color: var(--accent); }
  .swatches { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
  .sw { width: 30px; height: 30px; border-radius: 8px; cursor: pointer; border: 2px solid transparent;
    transition: transform .1s; }
  .sw:hover { transform: scale(1.12); }
  .sw.sel { border-color: #fff; box-shadow: 0 0 0 2px #0008, 0 0 14px currentColor; }
  button.play { width: 100%; padding: 14px; font-family: inherit; font-size: 15px; font-weight: 700;
    letter-spacing: .04em; color: #04120e; background: var(--accent); border: none; border-radius: 10px;
    cursor: pointer; transition: filter .1s, transform .05s; }
  button.play:hover { filter: brightness(1.08); }
  button.play:active { transform: translateY(1px); }
  .died { font-size: 15px; color: var(--dim); margin-bottom: 6px; letter-spacing: .05em; }
  .final { font-size: 34px; font-weight: 800; color: var(--accent); margin-bottom: 22px; }
  .foot { margin-top: 22px; font-size: 10px; color: #3d4a66; letter-spacing: .06em; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="score" class="hud"></div>
<div id="board" class="hud"></div>
<div id="hint" class="hud">move <kbd>mouse</kbd> &nbsp; boost <kbd>space</kbd> / <kbd>click</kbd> (sheds mass)</div>
<div id="conn" class="hud">connecting…</div>

<div id="join" class="overlay">
  <div class="card">
    <div class="logo">cube<span class="io">.io</span></div>
    <div class="tag">eat cubes · grow · absorb rivals · boost to escape</div>
    <div class="field">
      <input id="name" type="text" maxlength="16" placeholder="name your cube" autocomplete="off" />
    </div>
    <div class="swatches" id="swatches"></div>
    <button class="play" id="playBtn">enter the arena</button>
    <div class="foot">authoritative sim runs as a WASM reducer inside OriginDB · state streams over the changefeed</div>
  </div>
</div>

<div id="death" class="overlay hidden">
  <div class="card">
    <div class="died">you were absorbed</div>
    <div class="final" id="finalMass">0</div>
    <button class="play" id="respawnBtn">respawn</button>
    <div class="foot">your cube keeps its identity — same session, best score remembered</div>
  </div>
</div>

<script src="/game.js"></script>
</body>
</html>
