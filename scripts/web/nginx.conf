# Nginx configuration for install.instantdb.com
server {
    listen 80;
    server_name install.instantdb.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name install.instantdb.com;

    # SSL configuration (replace with your certificates)
    ssl_certificate /etc/ssl/certs/instantdb.crt;
    ssl_certificate_key /etc/ssl/private/instantdb.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Document root
    root /var/www/install.instantdb.com;
    index index.html;

    # Serve the main install page
    location / {
        try_files $uri $uri/ =404;

        # Add CORS headers for script access
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range";
    }

    # Serve install scripts with proper content types
    location ~ \.(sh|bash)$ {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Access-Control-Allow-Origin *;
    }

    location ~ \.(ps1)$ {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Access-Control-Allow-Origin *;
    }

    location ~ \.(bat|cmd)$ {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Access-Control-Allow-Origin *;
    }

    # Route for the main install script (Unix/Linux/macOS)
    location = / {
        rewrite ^/$ /install.sh last;
    }

    # Route for Windows PowerShell script
    location /windows {
        rewrite ^/windows$ /install.ps1 last;
    }

    # Route for Windows Batch script
    location /windows.bat {
        rewrite ^/windows\.bat$ /install.bat last;
    }

    # Security: Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Health check endpoint
server {
    listen 8080;
    server_name localhost;

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}